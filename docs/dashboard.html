<!doctype html>
<meta charset="utf-8">
<title>India News Dashboard — TOI, NDTV, India Today</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root { --font: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
  body { font-family: var(--font); margin: 24px; }
  header { display:flex; gap:12px; align-items: center; flex-wrap: wrap; }
  input, select, button { font: 14px var(--font); padding: 8px 10px; border-radius: 10px; border:1px solid #ddd; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 18px; }
  .panel { border:1px solid #eee; border-radius: 14px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .panel h2 { font-size: 18px; margin: 0 0 10px; }
  ol { margin:0; padding-left: 22px; }
  li { margin: 8px 0; line-height: 1.35; }
  a { text-decoration: none; }
  a:hover { text-decoration: underline; }
  .muted { color:#666; font-size: 12px; }
  .meta { display:flex; gap:8px; align-items:center; margin-top: 6px; }
  @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
</style>
<header>
  <strong>India News Dashboard</strong>
  <span class="muted">Load the latest combined file generated by the scraper.</span>
  <input id="search" placeholder="Search headline...">
  <select id="sectionFilter">
    <option value="all">All sections</option>
    <option value="most_read">Most read</option>
    <option value="trending">Trending</option>
  </select>
  <select id="sort">
    <option value="rankAsc">Sort by rank (asc)</option>
    <option value="rankDesc">Sort by rank (desc)</option>
    <option value="alpha">Sort by headline (A→Z)</option>
  </select>
  <button id="reload">Reload</button>
</header>

<div class="grid">
  <div class="panel" id="toi">
    <h2>Times of India</h2>
    <div class="meta" id="toiMeta"></div>
    <ol id="toiList"></ol>
  </div>
  <div class="panel" id="ndtv">
    <h2>NDTV</h2>
    <div class="meta" id="ndtvMeta"></div>
    <ol id="ndtvList"></ol>
  </div>
  <div class="panel" id="it">
    <h2>India Today</h2>
    <div class="meta" id="itMeta"></div>
    <ol id="itList"></ol>
  </div>
</div>

<script>
const CSV_PATH = "./india_trending.csv";

const state = {
  raw: [],
  filterText: "",
  section: "all",
  sortMode: "rankAsc"
};

function normalizeRows(rows) {
  return rows.map(d => ({
    source: d.source || "",
    section: d.section || "",
    rank: +d.rank || 9999,
    headline: d.headline || "",
    link: d.link || "",
    collected_at_iso: d.collected_at_iso || ""
  }));
}

function applyFilters(rows) {
  let r = rows.slice();
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    r = r.filter(d => d.headline.toLowerCase().includes(q));
  }
  if (state.section !== "all") {
    r = r.filter(d => d.section === state.section);
  }
  switch (state.sortMode) {
    case "rankAsc":  r.sort((a, b) => a.rank - b.rank); break;
    case "rankDesc": r.sort((a, b) => b.rank - a.rank); break;
    case "alpha":    r.sort((a, b) => d3.ascending(a.headline, b.headline)); break;
  }
  return r;
}

function renderList(listId, rows) {
  const selection = d3.select(listId).selectAll("li").data(rows, d => `${d.section}:${d.link}`);
  selection.join(
    enter => {
      const li = enter.append("li");
      li.append("a")
        .attr("href", d => d.link)
        .attr("target", "_blank")
        .attr("rel", "noopener")
        .text(d => `[${d.section}] #${d.rank} ${d.headline}`);
      return li;
    },
    update => update.select("a").text(d => `[${d.section}] #${d.rank} ${d.headline}`),
    exit => exit.remove()
  );
}

function renderMeta(metaId, rows) {
  if (!rows.length) {
    d3.select(metaId).text("No data");
    return;
  }
  const sections = Array.from(new Set(rows.map(d => d.section))).join(", ");
  d3.select(metaId).text(`Items: ${rows.length} · Sections: ${sections} · Collected: ${rows[0].collected_at_iso}`);
}

function render() {
  const toi = applyFilters(state.raw.filter(d => d.source === "Times of India"));
  const ndtv = applyFilters(state.raw.filter(d => d.source === "NDTV"));
  const it = applyFilters(state.raw.filter(d => d.source === "India Today"));

  renderList("#toiList", toi);
  renderList("#ndtvList", ndtv);
  renderList("#itList", it);

  renderMeta("#toiMeta", toi);
  renderMeta("#ndtvMeta", ndtv);
  renderMeta("#itMeta", it);
}

async function loadData() {
  try {
    const rows = await d3.csv(CSV_PATH);
    state.raw = normalizeRows(rows);
    render();
  } catch (err) {
    console.error("Failed to load CSV:", err);
    state.raw = [];
    render();
  }
}

d3.select("#search").on("input", ev => {
  state.filterText = ev.target.value || "";
  render();
});
d3.select("#sectionFilter").on("change", ev => {
  state.section = ev.target.value;
  render();
});
d3.select("#sort").on("change", ev => {
  state.sortMode = ev.target.value;
  render();
});
d3.select("#reload").on("click", () => loadData());

loadData();
</script>
