name: Refresh Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r news-track-upload/requirements.txt
          python -m playwright install chromium

      - name: Generate dashboard
        run: |
          cd news-track-upload
          python scrape_india_news_trending.py \
            --site all \
            --headless \
            --out_csv ../docs/india_trending.csv \
            --out_json ../docs/india_trending.json \
            --out_html ../docs/index.html

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/india_trending.csv docs/india_trending.json
          git diff --cached --quiet || git commit -m "Refresh dashboard data"
          git push
